input {
  beats {
    port => 5044
  }
}

filter {
  if "auth" in [fileset][name] or "auth.log" in [log][file][path] {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:[system][auth][timestamp]} %{SYSLOGHOST:[system][auth][hostname]} sshd(?:\[%{POSINT:[system][auth][pid]}\])?: Failed password for (?:invalid user )?%{DATA:[system][auth][user]} from %{IPORHOST:[system][auth][ssh][ip]}(?: port %{NUMBER:[system][auth][ssh][port]})?(?: ssh2)?(?:%{GREEDYDATA:extra})?",
          "%{SYSLOGTIMESTAMP:[system][auth][timestamp]} %{SYSLOGHOST:[system][auth][hostname]} sshd(?:\[%{POSINT:[system][auth][pid]}\])?: Accepted password for %{DATA:[system][auth][user]} from %{IPORHOST:[system][auth][ssh][ip]} port %{NUMBER:[system][auth][ssh][port]} ssh2",
          "%{SYSLOGTIMESTAMP:[system][auth][timestamp]} %{SYSLOGHOST:[system][auth][hostname]} sshd(?:\[%{POSINT:[system][auth][pid]}\])?: %{GREEDYDATA:[system][auth][ssh][event]}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_auth"]
    }

    date {
      match => ["[system][auth][timestamp]", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target => "@timestamp"
      remove_field => ["[system][auth][timestamp]"]
    }

    if [system][auth][ssh][ip] {
      geoip {
        source => "[system][auth][ssh][ip]"
        target => "geoip"
      }
    }

    mutate {
      rename => {
        "[system][auth][user]"     => "ssh.user"
        "[system][auth][ssh][ip]"  => "ssh.source_ip"
        "[system][auth][ssh][port]" => "ssh.source_port"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "bincom-ssh-logs-%{+YYYY.MM.dd}"
  }
}
